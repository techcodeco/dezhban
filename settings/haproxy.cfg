global
    maxconn 100000
    nbthread 4
    tune.bufsize 65536
    # کاهش حافظه مصرفی برای latency کمتر
    tune.maxrewrite 1024

defaults
    mode tcp
    timeout connect 500ms    # کاهش از 2s به 500ms
    timeout client 10s       # کاهش از 30s
    timeout server 10s       # کاهش از 30s
    timeout queue 100ms      # مهم! کاهش زمان انتظار در صف
    option tcpka

frontend webhook_front
    bind :80
    mode tcp
    maxconn 50000
    # استفاده از backlog بزرگتر
    bind :80 backlog 10000
    default_backend webhook_back

backend webhook_back
    mode tcp
    # تغییر به leastconn برای توزیع بهتر
    balance leastconn
    
    # تنظیمات کانکشن پول
    retries 1
    option redispatch
    
    # افزایش کانکشن‌های همزمان به هر سرور
    server app1 127.0.0.1:3000 check inter 500 rise 2 fall 3 weight 100 maxconn 2000
    server app2 127.0.0.1:3001 check inter 500 rise 2 fall 3 weight 100 maxconn 2000
    server app3 127.0.0.1:3002 check inter 500 rise 2 fall 3 weight 100 maxconn 2000
    server app4 127.0.0.1:3003 check inter 500 rise 2 fall 3 weight 100 maxconn 2000
    server app5 127.0.0.1:3004 check inter 500 rise 2 fall 3 weight 100 maxconn 2000
